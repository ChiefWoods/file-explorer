name: file-explorer

services:
  db:
    image: postgres:18-alpine
    container_name: file-explorer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-file_explorer_dev}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-file_explorer_dev}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  test-db:
    profiles: ["test"]
    image: postgres:18-alpine
    container_name: file-explorer-test-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${TEST_POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${TEST_POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${TEST_POSTGRES_DB:-file_explorer_test}
    ports:
      - "${TEST_POSTGRES_PORT:-5433}:5432"
    volumes:
      - test_db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${TEST_POSTGRES_USER:-postgres} -d ${TEST_POSTGRES_DB:-file_explorer_test}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db_data:
  test_db_data:
